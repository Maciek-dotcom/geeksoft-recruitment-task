<div class="dashboard-container">
  <header class="dashboard-header">
    Trading Dashboard
    <button class="theme-toggle" (click)="themeService.toggle()">
      {{ themeService.theme() === "dark" ? "☀️" : "🌙" }}
    </button>
  </header>

  <section class="dashboard-section">
    <app-dashboard-trading-form />
  </section>

  <section class="dashboard-section dashboard-section--table">
    <app-dashboard-order-table />
  </section>
</div>
